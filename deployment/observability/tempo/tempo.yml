server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 127.0.0.1:4319

memberlist:
  abort_if_cluster_join_fails: false
  bind_addr:
    - 127.0.0.1
  bind_port: 7946
  advertise_addr: 127.0.0.1
  advertise_port: 7946

ingester:
  lifecycler:
    ring:
      replication_factor: 1
      kvstore:
        store: inmemory
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h
  ring:
    kvstore:
      store: inmemory

storage:
  trace:
    backend: local
    local:
      path: /var/lib/tempo/traces

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1073741824
  trace_by_id:
    duration_slo: 5s
