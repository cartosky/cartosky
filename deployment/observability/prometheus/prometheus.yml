global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    stack: cartosky

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: cartosky-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8200
        labels:
          service: api
          instance: cartosky-prod

  # Enable after node_exporter is installed on the shared host.
  # - job_name: node
  #   static_configs:
